name: Build And release

on:
  push:
    tags:
      - "v*"

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
    - run: npm install yarn -g
    - run: yarn
    - run: yarn build
    - name: release
      uses: softprops/action-gh-release@v3
      with:
          files: dist/
       
    
   
